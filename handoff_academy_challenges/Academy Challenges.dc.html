  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>

    {{ body }}
  </div>
  {{ switcher }}
  {{ toastEl }}
</div>
</x-dc>

  chip(label, tone){ const C=this.C; const m={ ok:[C.ok,C.okSoft,'rgba(52,211,153,0.25)'], warn:[C.warn,C.warnSoft,'rgba(251,191,36,0.25)'], info:[C.ac,C.acSoft,C.acLine], plain:[C.mut,C.surf,C.bd], violet:[C.violet,'rgba(167,139,250,0.12)','rgba(167,139,250,0.28)'] }; const [c,b,bd]=m[tone]||m.plain;

  // ── CHROME ──
