<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="40" height="40" rx="10" fill="url(#bg)"/>

  <!-- L stem -->
  <rect x="10" y="8" width="6" height="24" rx="3" fill="white" opacity="0.95"/>
  <!-- L foot -->
  <rect x="10" y="26" width="16" height="6" rx="3" fill="white" opacity="0.95"/>

  <!-- Accent bolt overlay -->
  <path d="M23 8 L16.5 20 H21.5 L15 32" stroke="url(#bolt)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
