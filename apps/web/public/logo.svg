<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" fill="none">
  <!-- Mark: stylised "L" slash bolt -->
  <defs>
    <linearGradient id="markGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="dotGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- Rounded square bg -->
  <rect x="2" y="2" width="36" height="36" rx="9" fill="url(#markGrad)" opacity="0.15"/>

  <!-- Bold "L" shape -->
  <rect x="11" y="9" width="5" height="22" rx="2.5" fill="url(#markGrad)"/>
  <rect x="11" y="26" width="14" height="5" rx="2.5" fill="url(#markGrad)"/>

  <!-- Accent slash / bolt over L -->
  <path d="M21 9 L15.5 20.5 H20 L14 31" stroke="url(#dotGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Wordmark -->
  <text x="48" y="27" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" letter-spacing="-0.5" fill="white">Leadash</text>
</svg>
